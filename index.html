<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKPG Engine - Smart Prompt Generator by Jeck</title>
  <!-- CDNs for Standalone Deployment (Netlify/Vercel compatible) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load React FIRST -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load Core Lucide library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    /**
     * Optimized Icon Component for Browser Compatibility
     * Ensures icons render correctly on Vercel/Netlify without conflicts
     */
    const Icon = ({ name, size = 16, className = "" }) => {
      const containerRef = useRef(null);

      useEffect(() => {
        const renderIcon = () => {
          if (containerRef.current && window.lucide) {
            containerRef.current.innerHTML = '';
            const iconName = name.charAt(0).toLowerCase() + name.slice(1);
            const iconData = window.lucide.icons[iconName] || window.lucide.icons.helpCircle;
            
            if (iconData) {
              const svg = window.lucide.createSvg(iconData, {
                width: size,
                height: size,
                class: className,
                'stroke-width': 2,
                stroke: 'currentColor',
                fill: 'none'
              });
              containerRef.current.appendChild(svg);
            }
          }
        };

        renderIcon();
        // Fallback for slower network loading
        if (!window.lucide) {
          const interval = setInterval(() => {
            if (window.lucide) {
              renderIcon();
              clearInterval(interval);
            }
          }, 100);
          return () => clearInterval(interval);
        }
      }, [name, size, className]);

      return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" />;
    };

    const apiKey = ""; // Set your API Key here for standalone Vercel deployment

    const STYLES = {
      corona: {
        name: "Corona Renderer",
        promptSuffix: "Chaos Corona Renderer style, architectural visualization, photorealistic, 8k resolution, lightmix."
      },
      unreal: {
        name: "Unreal Engine 5",
        promptSuffix: "Unreal Engine 5 render, cinematic lighting, Lumen, Nanite detail, volumetric lighting, hyper-realistic, 8k."
      },
      midjourney: {
        name: "Midjourney Style",
        promptSuffix: "Midjourney v6 style, dramatic lighting, high aesthetic, vibrant colors, cinematic, sharp focus."
      },
      flux: {
        name: "Flux Engine",
        promptSuffix: "Flux model style, hyper-realistic photography, intricate textures, high precision, 16k resolution."
      },
      kling: {
        name: "Kling Cinematic",
        promptSuffix: "Kling AI style, cinematic film look, 35mm film grain, depth of field, professional cinematography."
      },
      leonardo: {
        name: "Leonardo AI",
        promptSuffix: "Leonardo AI style, PhotoReal, fine-tuned detail, high-end digital art look, sharp details."
      },
      sdxl: {
        name: "SDXL / Free",
        promptSuffix: "Stable Diffusion XL 1.0 style, highly detailed, sharp edges, clean lines, realistic lighting."
      }
    };

    const SHOT_TYPES = {
      front: {
        name: "Front View",
        suffix: "straight-on front view, symmetrical composition, facade alignment."
      },
      wide: {
        name: "Wide Angle",
        suffix: "ultra-wide angle lens, 16mm lens, expansive architectural view."
      },
      macro: {
        name: "Macro / Close-up",
        suffix: "extreme close-up shot, macro photography, shallow depth of field, 85mm lens."
      },
      left_perspective: {
        name: "Left Perspective",
        suffix: "architectural shot from the left side, 45-degree angle from the left."
      },
      right_perspective: {
        name: "Right Perspective",
        suffix: "architectural shot from the right side, 45-degree angle from the right."
      },
      aerial: {
        name: "Aerial View",
        suffix: "drone photography, bird's eye view, high angle aerial shot."
      }
    };

    const SEASONS = {
      default: {
        name: "Standard",
        suffix: ""
      },
      spring: {
        name: "Spring",
        suffix: "spring season, blooming flowers, blossoming trees, soft warm sunlight."
      },
      summer: {
        name: "Summer",
        suffix: "harsh summer sun, high contrast shadows, deep green foliage."
      },
      autumn: {
        name: "Autumn",
        suffix: "autumn season, golden leaves, warm sunset lighting, crisp air."
      },
      winter: {
        name: "Winter",
        suffix: "winter season, heavy snow, frosted surfaces, cold blue lighting."
      },
      monsoon: {
        name: "Monsoon",
        suffix: "rainy season, heavy rain, wet surfaces, moody clouds, reflections."
      }
    };

    const App = () => {
      const [selectedImage, setSelectedImage] = useState(null);
      const [previewUrl, setPreviewUrl] = useState(null);
      
      // Master Prompt States
      const [prompt, setPrompt] = useState("Modern architectural design");
      const [userSubject, setUserSubject] = useState("Modern architectural design");
      
      const [generatedImages, setGeneratedImages] = useState([]);
      const [focusedImageIdx, setFocusedImageIdx] = useState(0);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isRefining, setIsRefining] = useState(false);
      
      const [isInpaintMode, setIsInpaintMode] = useState(false);
      const [brushSize, setBrushSize] = useState(30);
      const [isDrawing, setIsDrawing] = useState(false);
      const canvasRef = useRef(null);
      const imageRef = useRef(null);
      
      const [activeStyle, setActiveStyle] = useState('corona');
      const [activeShots, setActiveShots] = useState(['front', 'wide', 'left_perspective', 'right_perspective']);
      const [activeSeason, setActiveSeason] = useState('default');
      const [history, setHistory] = useState([]);
      const [activeTab, setActiveTab] = useState('generate');
      const [status, setStatus] = useState("");
      
      const prevSettings = useRef({ style: activeStyle, season: activeSeason, shots: activeShots });

      /**
       * AUTOMATIC CONNECTIVITY LOGIC:
       * Syncs Render Engine, Season, and Shot settings into the prompt automatically
       * while allowing for manual user edits.
       */
      useEffect(() => {
        const settingsChanged = prevSettings.current.style !== activeStyle || 
                                prevSettings.current.season !== activeSeason ||
                                JSON.stringify(prevSettings.current.shots) !== JSON.stringify(activeShots);

        if (settingsChanged) {
          const styleText = STYLES[activeStyle]?.promptSuffix || "";
          const seasonText = SEASONS[activeSeason]?.suffix || "";
          const shotText = activeShots.length > 0 ? SHOT_TYPES[activeShots[0]]?.suffix : "";
          
          let composite = userSubject;
          if (shotText) composite += `, ${shotText}`;
          if (seasonText) composite += `, ${seasonText}`;
          if (styleText) composite += `, ${styleText}`;
          
          setPrompt(composite);
          prevSettings.current = { style: activeStyle, season: activeSeason, shots: activeShots };
        }
      }, [activeStyle, activeSeason, activeShots]);

      const fetchWithRetry = async (url, options, retries = 5) => {
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (response.ok) return await response.json();
            const errBody = await response.json();
            throw new Error(errBody.error?.message || "Internal API Error");
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
          }
        }
      };

      const toggleShot = (key) => {
        setActiveShots(prev => {
          if (prev.includes(key)) {
            return prev.length > 4 ? prev.filter(k => k !== key) : prev;
          } else {
            return [...prev, key];
          }
        });
      };

      const initCanvas = () => {
        const canvas = canvasRef.current;
        if (!canvas || !imageRef.current) return;
        const img = imageRef.current;
        canvas.width = img.clientWidth;
        canvas.height = img.clientHeight;
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.6)'; 
        ctx.lineWidth = brushSize;
      };

      useEffect(() => {
        if (isInpaintMode && previewUrl) {
          setTimeout(initCanvas, 100);
        }
      }, [isInpaintMode, previewUrl, brushSize]);

      const startDrawing = (e) => {
        if (!isInpaintMode) return;
        setIsDrawing(true);
        draw(e);
      };

      const stopDrawing = () => {
        setIsDrawing(false);
        const canvas = canvasRef.current;
        if (canvas) canvas.getContext('2d').beginPath();
      };

      const draw = (e) => {
        if (!isDrawing || !isInpaintMode) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        ctx.lineWidth = brushSize;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const clearMask = () => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      };

      const getMaskData = () => {
        const canvas = canvasRef.current;
        if (!canvas) return null;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.fillStyle = 'black';
        tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tCtx.globalCompositeOperation = 'source-over';
        tCtx.drawImage(canvas, 0, 0);
        const imgData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        for (let i = 0; i < imgData.data.length; i += 4) {
          if (imgData.data[i + 3] > 0) {
            imgData.data[i] = 255; imgData.data[i+1] = 255; imgData.data[i+2] = 255; imgData.data[i+3] = 255;
          }
        }
        tCtx.putImageData(imgData, 0, 0);
        return tempCanvas.toDataURL('image/png').split(',')[1];
      };

      const refinePrompt = async () => {
        if (!apiKey) { setStatus("Set API Key in code first."); return; }
        if (!prompt) { setStatus("Enter a prompt first ✨"); return; }
        setIsRefining(true);
        setStatus("✨ Magic Refiner active...");
        try {
          const systemPrompt = "You are an expert architectural visualization prompt engineer. Output ONLY the refined text.";
          const userQuery = `Refine this prompt for a ${STYLES[activeStyle].name} render: ${prompt}`;
          const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: userQuery }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] }
            })
          });
          const refinedText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (refinedText) { 
            setUserSubject(refinedText.trim());
            setStatus("✨ Prompt refined!"); 
          }
        } catch (error) { 
          setStatus("Refinement failed."); 
        } finally { 
          setIsRefining(false); 
        }
      };

      const handleProcess = async () => {
        if (!apiKey) { setStatus("Set API Key in index.html"); return; }
        if (!prompt) { setStatus("Please enter a prompt first."); return; }
        if (activeShots.length < 4) { setStatus("Select at least 4 camera shots!"); return; }
        setIsGenerating(true);
        setStatus(`Initialising Quad-Engine on Vercel...`);
        setGeneratedImages([null, null, null, null]); 
        setFocusedImageIdx(0);
        
        const maskBase64 = isInpaintMode ? getMaskData() : null;

        const processVariation = async (idx) => {
          const shotKey = activeShots[idx % activeShots.length];
          const shotSuffix = SHOT_TYPES[shotKey].suffix;
          const currentFullPrompt = `${prompt}, ${shotSuffix}`;
          
          try {
            let b64 = null;
            if (selectedImage) {
              const parts = [
                { text: isInpaintMode 
                    ? `STRICT INSTRUCTION: Only modify masked area. Maintain accuracy for the rest. Apply: ${currentFullPrompt}.`
                    : `STRICT INSTRUCTION: Maintain exact architectural form, layout, and building geometry. Apply style: ${currentFullPrompt}. Perspective: ${SHOT_TYPES[shotKey].name}.` 
                },
                { inlineData: { mimeType: "image/png", data: selectedImage } }
              ];
              if (maskBase64) parts.push({ inlineData: { mimeType: "image/png", data: maskBase64 } });
              
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts }],
                  generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                })
              });
              b64 = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
            } else {
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  instances: { prompt: currentFullPrompt },
                  parameters: { sampleCount: 1 }
                })
              });
              b64 = res.predictions?.[0]?.bytesBase64Encoded;
            }

            if (b64) {
              const dataUrl = `data:image/png;base64,${b64}`;
              setGeneratedImages(prev => {
                const updated = [...prev];
                updated[idx] = dataUrl;
                return updated;
              });
              setHistory(prev => [dataUrl, ...prev]);
            }
          } catch (err) {
            console.error(`Variation ${idx} failed:`, err);
          }
        };

        try {
          await Promise.all([
            processVariation(0),
            processVariation(1),
            processVariation(2),
            processVariation(3)
          ]);
          setStatus("Quad-rendering complete!");
        } catch (error) { 
          setStatus("Rendering failed. Check API Key / CORS."); 
        } finally { 
          setIsGenerating(false); 
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setSelectedImage(reader.result.split(',')[1]); 
            setPreviewUrl(reader.result);
            clearMask();
          };
          reader.readAsDataURL(file);
        }
      };

      const sendToSketchup = () => {
        const activeImage = generatedImages[focusedImageIdx];
        if (window.sketchup && activeImage) {
          const base64 = activeImage.split(',')[1];
          window.sketchup.apply_texture(base64);
        } else { setStatus("Not inside SketchUp."); }
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30">
          <header className="border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                  <Icon name="Sparkles" className="text-white w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">SKPG Engine</h1>
                  <p className="text-[10px] uppercase tracking-widest text-blue-400 font-semibold">Smart Prompt Generator by Jeck</p>
                </div>
              </div>
              <nav className="flex bg-slate-800/50 p-1 rounded-lg border border-white/5">
                <button onClick={() => setActiveTab('generate')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'generate' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Generate</button>
                <button onClick={() => setActiveTab('history')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Gallery</button>
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            {activeTab === 'generate' ? (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-4 space-y-6">
                  <section className="bg-slate-900 border border-white/5 rounded-2xl p-6 shadow-xl space-y-6 overflow-y-auto max-h-[85vh] custom-scrollbar">
                    
                    <div>
                      <div className="flex items-center gap-2 mb-3">
                         <Icon name="Cpu" className="w-3 h-3 text-blue-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Render Engine</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.keys(STYLES).map(key => (
                          <button key={key} onClick={() => setActiveStyle(key)} className={`p-2 rounded-lg text-[9px] font-bold border transition-all text-left flex flex-col justify-center ${activeStyle === key ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-800 border-white/5 text-slate-400 hover:border-white/10'}`}>
                            <span className="truncate">{STYLES[key].name}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="CloudSun" className="w-3 h-3 text-emerald-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Season</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.entries(SEASONS).map(([key, season]) => (
                          <button 
                            key={key} 
                            onClick={() => setActiveSeason(key)} 
                            className={`p-2 rounded-xl text-[9px] font-bold border transition-all text-left flex items-center justify-between ${activeSeason === key ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg shadow-emerald-900/20' : 'bg-slate-800 border-white/5 text-slate-400 hover:border-white/10'}`}
                          >
                            {season.name}
                            {activeSeason === key && <Icon name="CheckCircle2" className="w-3 h-3" />}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="flex items-center justify-between mb-3">
                         <div className="flex items-center gap-2">
                            <Icon name="Camera" className="w-3 h-3 text-indigo-400" />
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Camera Shot Type</label>
                         </div>
                         <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${activeShots.length < 4 ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`}>
                            {String(activeShots.length)}/4 Selected
                         </span>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.entries(SHOT_TYPES).map(([key, shot]) => (
                          <button key={key} onClick={() => toggleShot(key)} className={`p-2 rounded-xl text-[10px] font-bold border transition-all text-left flex items-center justify-between ${activeShots.includes(key) ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-800 border-white/5 text-slate-400'}`}>
                            {shot.name}
                            {activeShots.includes(key) && <Icon name="CheckCircle2" className="w-3 h-3" />}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="flex justify-between items-center mb-3">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Input Geometry</label>
                        <button onClick={() => setIsInpaintMode(!isInpaintMode)} className={`text-[9px] flex items-center gap-1 px-2 py-1 rounded-lg transition-all font-bold uppercase ${isInpaintMode ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500 border border-white/5'}`}>
                          <Icon name="Brush" className="w-3 h-3" /> Inpaint Mode
                        </button>
                      </div>
                      <div className="relative overflow-hidden rounded-xl border border-white/10 bg-slate-950 aspect-video group shadow-inner">
                        <div className={`absolute inset-0 flex flex-col items-center justify-center transition-all ${previewUrl ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} onClick={() => document.getElementById('image-upload').click()}>
                          <Icon name="Upload" className="w-8 h-8 text-slate-800 mb-2" />
                          <span className="text-[10px] text-slate-600 font-bold uppercase tracking-widest text-center px-4">Capture Model Viewport</span>
                        </div>
                        {previewUrl && (
                          <div className="relative w-full h-full">
                            <img ref={imageRef} src={previewUrl} className="w-full h-full object-contain" alt="Input" />
                            {isInpaintMode && <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full cursor-crosshair touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />}
                            <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => document.getElementById('image-upload').click()} className="p-1.5 bg-black/60 rounded-lg hover:bg-black transition-all shadow-xl"><Icon name="RefreshCw" className="w-3 h-3 text-white" /></button>
                              {isInpaintMode && <button onClick={clearMask} className="p-1.5 bg-black/60 rounded-lg hover:bg-red-500 transition-all shadow-xl"><Icon name="RotateCcw" className="w-3 h-3 text-white" /></button>}
                            </div>
                          </div>
                        )}
                        <input id="image-upload" type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                      </div>
                    </div>

                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Master Prompt</label>
                        <button onClick={refinePrompt} disabled={isRefining || !prompt} className="text-[9px] flex items-center gap-1 text-blue-400 disabled:opacity-30 font-bold uppercase"><Icon name="Wand2" className="w-3 h-3" /> Magic Refine</button>
                      </div>
                      <textarea 
                        value={prompt} 
                        onChange={(e) => {
                          const val = e.target.value;
                          setPrompt(val);
                          // Heuristic: update core subject only from the beginning of the manual edit
                          const parts = val.split(',');
                          if (parts.length > 0) setUserSubject(parts[0].trim());
                        }} 
                        className="w-full h-28 bg-slate-800 rounded-xl p-4 text-xs focus:ring-2 focus:ring-blue-500/50 outline-none resize-none border border-white/5" 
                      />
                    </div>

                    <button onClick={handleProcess} disabled={isGenerating || activeShots.length < 4} className={`w-full py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-3 shadow-2xl ${isInpaintMode ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-blue-600 hover:bg-blue-500'} disabled:opacity-50`}>
                      {isGenerating ? <Icon name="RefreshCw" className="animate-spin w-5 h-5 text-white" /> : <Icon name="Zap" className="w-5 h-5 text-white" />}
                      {isGenerating ? 'Engine Running...' : 'Start Engine'}
                    </button>
                  </section>

                  {status && (
                    <div className="bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl flex items-center gap-2">
                      <Icon name="Info" className="w-4 h-4 text-blue-400 shrink-0" />
                      <p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest text-wrap">{String(status)}</p>
                    </div>
                  )}
                </div>

                <div className="lg:col-span-8 flex flex-col gap-6">
                  <div className="bg-slate-900 border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl flex flex-col flex-grow min-h-[600px]">
                    <div className="p-5 bg-slate-800/30 flex justify-between items-center border-b border-white/5">
                      <div className="flex items-center gap-3">
                        <Icon name="LayoutGrid" className="w-4 h-4 text-blue-400" />
                        <span className="text-xs font-bold uppercase tracking-widest text-slate-400 italic">Accuracy Optimized Output</span>
                      </div>
                      {generatedImages.length > 0 && generatedImages.some(img => img !== null) && (
                        <button onClick={sendToSketchup} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-bold flex items-center gap-2 hover:bg-indigo-500 shadow-lg shadow-indigo-600/20">
                          <Icon name="Box" className="w-4 h-4" /> Apply Selection to Model
                        </button>
                      )}
                    </div>
                    <div className="relative flex-grow bg-slate-950 p-6">
                      {generatedImages.length > 0 ? (
                        <div className="grid grid-cols-2 gap-4 h-full">
                          {generatedImages.map((img, idx) => (
                            <div key={idx} onClick={() => img && setFocusedImageIdx(idx)} className={`relative rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 border-4 ${focusedImageIdx === idx ? 'border-blue-500 scale-[1.02] shadow-2xl z-10' : 'border-transparent opacity-60 hover:opacity-100'} ${!img ? 'bg-slate-900/50 flex items-center justify-center animate-pulse' : ''}`}>
                              {img ? (
                                <>
                                  <img src={img} className="w-full h-full object-cover" alt="Variation" />
                                  <div className="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg text-[9px] font-black uppercase text-white border border-white/10">
                                    {SHOT_TYPES[activeShots[idx % activeShots.length]]?.name || "View"}
                                  </div>
                                  {focusedImageIdx === idx && <div className="absolute top-3 right-3 bg-blue-500 p-1.5 rounded-full"><Icon name="CheckCircle2" className="w-4 h-4 text-white" /></div>}
                                </>
                              ) : (
                                <Icon name="RefreshCw" className="animate-spin w-8 h-8 text-slate-700" />
                              )}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center opacity-10 animate-pulse text-center">
                          <Icon name="Cpu" className="w-24 h-24 mb-6" />
                          <p className="text-2xl font-black uppercase tracking-[0.5em]">Awaiting Instruction</p>
                          <p className="text-[10px] text-slate-600 uppercase tracking-widest mt-2 font-bold">Vercel Pipeline Ready</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-8">
                <h2 className="text-2xl font-black flex items-center gap-3 uppercase italic tracking-tighter">
                   <Icon name="Layers" className="text-blue-500 w-8 h-8" /> Gallery History
                </h2>
                {history.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    {history.map((img, idx) => (
                      <div key={idx} className="group relative aspect-square rounded-2xl overflow-hidden border border-white/10 bg-slate-900 shadow-xl">
                        <img src={img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="History" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all flex flex-col justify-end p-4">
                            <button onClick={() => { const link = document.createElement('a'); link.href = img; link.download = `skpg-archive-${idx}.png`; link.click(); }} className="w-full py-2 bg-blue-600 rounded-lg text-[10px] font-bold uppercase tracking-widest">Download</button>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <div className="py-20 text-center opacity-20 italic font-black uppercase tracking-widest">Archive Empty</div>}
              </div>
            )}
          </main>

          <footer className="border-t border-white/5 py-8 mt-12 text-center">
             <p className="text-[9px] uppercase tracking-[0.4em] text-slate-600 font-bold">Smart Prompt Generator v3.6 // Developed by Jeck // Accuracy Quad-Engine</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
