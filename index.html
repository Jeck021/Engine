<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKPG Engine - Smart Prompt Generator by Jeck</title>
  <!-- CDNs for Standalone Deployment (Netlify/Vercel compatible) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load React FIRST -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load Core Lucide library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
    .image-placeholder {
      background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    /**
     * Optimized Icon Component for Vercel/Netlify
     * Prevents "Lucide is undefined" crashes on live environments
     */
    const Icon = ({ name, size = 16, className = "" }) => {
      const containerRef = useRef(null);

      useEffect(() => {
        const render = () => {
          if (containerRef.current && window.lucide) {
            containerRef.current.innerHTML = '';
            const iconName = name.charAt(0).toLowerCase() + name.slice(1);
            const iconData = window.lucide.icons[iconName] || window.lucide.icons.helpCircle;
            if (iconData) {
              const svg = window.lucide.createSvg(iconData, {
                width: size,
                height: size,
                class: className,
                'stroke-width': 2,
                stroke: 'currentColor',
                fill: 'none'
              });
              containerRef.current.appendChild(svg);
            }
          }
        };

        if (window.lucide) {
          render();
        } else {
          // Retry logic for slow script loading on live servers
          const checkLucide = setInterval(() => {
            if (window.lucide) {
              render();
              clearInterval(checkLucide);
            }
          }, 100);
          return () => clearInterval(checkLucide);
        }
      }, [name, size, className]);

      return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" />;
    };

    const apiKey = ""; // Set API Key here for deployment

    const STYLES = {
      corona: { name: "Corona Renderer", promptSuffix: "Chaos Corona Renderer style, architectural visualization, photorealistic, 8k resolution, lightmix." },
      unreal: { name: "Unreal Engine 5", promptSuffix: "Unreal Engine 5 render, cinematic lighting, Lumen, volumetric lighting, hyper-realistic, 8k." },
      midjourney: { name: "Midjourney Style", promptSuffix: "Midjourney v6 style, dramatic lighting, high aesthetic, vibrant colors, cinematic, sharp focus." },
      flux: { name: "Flux Engine", promptSuffix: "Flux model style, hyper-realistic photography, intricate textures, masterpiece, high precision, 16k resolution." },
      kling: { name: "Kling Cinematic", promptSuffix: "Kling AI style, cinematic film look, 35mm film grain, depth of field, professional cinematography." },
      leonardo: { name: "Leonardo AI", promptSuffix: "Leonardo AI style, PhotoReal, fine-tuned detail, high-end digital art look, sharp details." },
      sdxl: { name: "SDXL / Free", promptSuffix: "Stable Diffusion XL 1.0 style, highly detailed, sharp edges, clean lines, realistic lighting." }
    };

    const SHOT_TYPES = {
      front: { name: "Front View", suffix: "straight-on front view, symmetrical composition, facade alignment." },
      wide: { name: "Wide Angle", suffix: "ultra-wide angle lens, 16mm lens, expansive architectural view." },
      macro: { name: "Macro / Close-up", suffix: "extreme close-up shot, macro photography, shallow depth of field, 85mm lens." },
      left_perspective: { name: "Left Perspective", suffix: "architectural shot from the left side, 45-degree angle from the left." },
      right_perspective: { name: "Right Perspective", suffix: "architectural shot from the right side, 45-degree angle from the right." },
      aerial: { name: "Aerial View", suffix: "drone photography, bird's eye view, high angle aerial shot." }
    };

    const SEASONS = {
      default: { name: "Standard", suffix: "" },
      spring: { name: "Spring", suffix: "spring season, blooming flowers, blossoming trees, soft warm sunlight." },
      summer: { name: "Summer", suffix: "harsh summer sun, high contrast shadows, deep green foliage." },
      autumn: { name: "Autumn", suffix: "autumn season, golden leaves, warm sunset lighting, crisp air." },
      winter: { name: "Winter", suffix: "winter season, heavy snow, frosted surfaces, cold blue lighting." },
      monsoon: { name: "Monsoon", suffix: "rainy season, heavy rain, wet surfaces, moody clouds, reflections." }
    };

    const App = () => {
      const [selectedImage, setSelectedImage] = useState(null);
      const [previewUrl, setPreviewUrl] = useState(null);
      const [prompt, setPrompt] = useState("Modern architectural design");
      const [userSubject, setUserSubject] = useState("Modern architectural design");
      const [generatedImages, setGeneratedImages] = useState([]);
      const [focusedImageIdx, setFocusedImageIdx] = useState(0);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isRefining, setIsRefining] = useState(false);
      const [activeStyle, setActiveStyle] = useState('corona');
      const [activeShots, setActiveShots] = useState(['front', 'wide', 'left_perspective', 'right_perspective']);
      const [activeSeason, setActiveSeason] = useState('default');
      const [history, setHistory] = useState([]);
      const [activeTab, setActiveTab] = useState('generate');
      const [status, setStatus] = useState("");
      
      const prevSettings = useRef({ style: activeStyle, season: activeSeason, shots: activeShots });

      /**
       * AUTOMATIC CONNECTIVITY:
       * Monitors settings and rebuilds Master Prompt while preserving the core subject.
       */
      useEffect(() => {
        const settingsChanged = prevSettings.current.style !== activeStyle || 
                                prevSettings.current.season !== activeSeason ||
                                JSON.stringify(prevSettings.current.shots) !== JSON.stringify(activeShots);

        if (settingsChanged) {
          const styleText = STYLES[activeStyle]?.promptSuffix || "";
          const seasonText = SEASONS[activeSeason]?.suffix || "";
          const shotText = activeShots.length > 0 ? SHOT_TYPES[activeShots[0]]?.suffix : "";
          
          let composite = userSubject;
          if (shotText) composite += `, ${shotText}`;
          if (seasonText) composite += `, ${seasonText}`;
          if (styleText) composite += `, ${styleText}`;
          
          setPrompt(composite);
          prevSettings.current = { style: activeStyle, season: activeSeason, shots: activeShots };
        }
      }, [activeStyle, activeSeason, activeShots, userSubject]);

      const fetchWithRetry = async (url, options, retries = 5) => {
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            const data = await response.json();
            if (response.ok) return data;
            throw new Error(data.error?.message || `API Error ${response.status}`);
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
          }
        }
      };

      const handleProcess = async () => {
        if (!prompt) { setStatus("Prompt required."); return; }
        if (activeShots.length < 4) { setStatus("Select 4 camera views."); return; }
        setIsGenerating(true);
        setStatus("Starting Engine: Processing Quad-Sequence...");
        setGeneratedImages([null, null, null, null]); 
        
        const processVariation = async (idx) => {
          const shotKey = activeShots[idx % activeShots.length];
          const shotSuffix = SHOT_TYPES[shotKey].suffix;
          const currentFullPrompt = `${prompt}, ${shotSuffix}`;
          
          try {
            let b64 = null;
            if (selectedImage) {
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [
                    { text: `STRICT INSTRUCTION: Maintain exact architectural form, layout, and building geometry. Apply style: ${currentFullPrompt}. Perspective: ${SHOT_TYPES[shotKey].name}.` },
                    { inlineData: { mimeType: "image/png", data: selectedImage } }
                  ]}],
                  generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                })
              });
              b64 = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
            } else {
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instances: { prompt: currentFullPrompt }, parameters: { sampleCount: 1 } })
              });
              b64 = res.predictions?.[0]?.bytesBase64Encoded;
            }

            if (b64) {
              const dataUrl = `data:image/png;base64,${b64}`;
              setGeneratedImages(prev => {
                const updated = [...prev];
                updated[idx] = dataUrl;
                return updated;
              });
              setHistory(prev => [dataUrl, ...prev]);
            }
          } catch (err) {
            console.error(err);
            setStatus(`Slot ${idx+1} Error: ${err.message}`);
          }
        };

        try {
          await Promise.all([0, 1, 2, 3].map(i => processVariation(i)));
          setStatus("Engine Run Complete.");
        } catch (error) { 
          setStatus("Critical Engine Failure."); 
        } finally { 
          setIsGenerating(false); 
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setSelectedImage(reader.result.split(',')[1]); 
            setPreviewUrl(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const sendToSketchup = () => {
        const activeImage = generatedImages[focusedImageIdx];
        if (window.sketchup && activeImage) {
          window.sketchup.apply_texture(activeImage.split(',')[1]);
        } else { setStatus("SketchUp link unavailable."); }
      };

      return (
        <div className="min-h-screen bg-slate-950 font-sans selection:bg-blue-500/30">
          <header className="border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                  <Icon name="Sparkles" className="text-white w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white tracking-tight">SKPG Engine</h1>
                  <p className="text-[9px] uppercase tracking-widest text-blue-400 font-bold">Vercel Performance Pipeline</p>
                </div>
              </div>
              <nav className="flex bg-slate-800/50 p-1 rounded-lg border border-white/5">
                <button onClick={() => setActiveTab('generate')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'generate' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Generate</button>
                <button onClick={() => setActiveTab('history')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Gallery</button>
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            {activeTab === 'generate' ? (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-4 space-y-6">
                  <section className="bg-slate-900 border border-white/5 rounded-2xl p-6 shadow-xl space-y-6 overflow-y-auto max-h-[85vh] custom-scrollbar">
                    
                    <div>
                      <div className="flex items-center gap-2 mb-3">
                         <Icon name="Cpu" className="w-3 h-3 text-blue-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Render Engine</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.keys(STYLES).map(key => (
                          <button key={key} onClick={() => setActiveStyle(key)} className={`p-2 rounded-lg text-[9px] font-bold border transition-all text-left flex flex-col justify-center ${activeStyle === key ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800 border-white/5 text-slate-400'}`}>
                            <span className="truncate">{STYLES[key].name}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="CloudSun" className="w-3 h-3 text-emerald-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Season</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.entries(SEASONS).map(([key, season]) => (
                          <button key={key} onClick={() => setActiveSeason(key)} className={`p-2 rounded-xl text-[9px] font-bold border transition-all text-left flex items-center justify-between ${activeSeason === key ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg shadow-emerald-900/20' : 'bg-slate-800 border-white/5 text-slate-400'}`}>
                            {season.name}
                            {activeSeason === key && <Icon name="CheckCircle2" className="w-3 h-3" />}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="flex items-center justify-between mb-3">
                         <div className="flex items-center gap-2">
                            <Icon name="Camera" className="w-3 h-3 text-indigo-400" />
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Camera Shots (4 Required)</label>
                         </div>
                         <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${activeShots.length < 4 ? 'bg-red-500/20 text-red-400' : 'bg-blue-500/20 text-blue-400'}`}>
                            {String(activeShots.length)}/4
                         </span>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.entries(SHOT_TYPES).map(([key, shot]) => (
                          <button key={key} onClick={() => {
                            setActiveShots(prev => prev.includes(key) ? (prev.length > 4 ? prev.filter(k => k !== key) : prev) : [...prev, key]);
                          }} className={`p-2 rounded-xl text-[10px] font-bold border transition-all text-left flex items-center justify-between ${activeShots.includes(key) ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-800 border-white/5 text-slate-400'}`}>
                            {shot.name}
                            {activeShots.includes(key) && <Icon name="CheckCircle2" className="w-3 h-3" />}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="flex justify-between items-center mb-3">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Model Reference</label>
                      </div>
                      <div className="relative overflow-hidden rounded-xl border border-white/10 bg-slate-950 aspect-video group shadow-inner image-placeholder">
                        <div className={`absolute inset-0 flex flex-col items-center justify-center transition-all ${previewUrl ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} onClick={() => document.getElementById('image-upload').click()}>
                          <Icon name="Upload" className="w-8 h-8 text-slate-800 mb-2" />
                          <span className="text-[10px] text-slate-600 font-bold uppercase text-center px-4">Upload Design Screenshot</span>
                        </div>
                        {previewUrl && (
                          <div className="relative w-full h-full">
                            <img ref={imageRef} src={previewUrl} className="w-full h-full object-contain" />
                            <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => document.getElementById('image-upload').click()} className="p-1.5 bg-black/60 rounded-lg hover:bg-black transition-all shadow-xl"><Icon name="RefreshCw" className="w-3 h-3 text-white" /></button>
                            </div>
                          </div>
                        )}
                        <input id="image-upload" type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                      </div>
                    </div>

                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Master Prompt</label>
                      </div>
                      <textarea value={prompt} onChange={(e) => {
                          const val = e.target.value;
                          setPrompt(val);
                          const firstComma = val.indexOf(',');
                          setUserSubject(firstComma !== -1 ? val.substring(0, firstComma).trim() : val.trim());
                        }} 
                        className="w-full h-28 bg-slate-800 rounded-xl p-4 text-xs focus:ring-2 focus:ring-blue-500/50 outline-none resize-none border border-white/5 leading-relaxed" 
                      />
                    </div>

                    <button onClick={handleProcess} disabled={isGenerating || activeShots.length < 4} className={`w-full py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] transition-all flex items-center justify-center gap-3 shadow-2xl ${isGenerating ? 'bg-slate-800' : 'bg-blue-600 hover:bg-blue-500 active:scale-[0.98]'} disabled:opacity-50`}>
                      {isGenerating ? <Icon name="RefreshCw" className="animate-spin w-5 h-5 text-white" /> : <Icon name="Zap" className="w-5 h-5 text-white shadow-xl" />}
                      {isGenerating ? 'Engine Processing...' : 'Start Engine'}
                    </button>
                  </section>

                  {status && (
                    <div className="bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl flex items-center gap-2">
                      <Icon name="Info" className="w-4 h-4 text-blue-400 shrink-0" />
                      <p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest overflow-hidden text-ellipsis">{String(status)}</p>
                    </div>
                  )}
                </div>

                <div className="lg:col-span-8 flex flex-col gap-6">
                  <div className="bg-slate-900 border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl flex flex-col flex-grow min-h-[600px]">
                    <div className="p-5 bg-slate-800/30 flex justify-between items-center border-b border-white/5">
                      <div className="flex items-center gap-3">
                        <Icon name="LayoutGrid" className="w-4 h-4 text-blue-400" />
                        <span className="text-xs font-bold uppercase tracking-widest text-slate-400 italic">Quad-Variation Output</span>
                      </div>
                      {generatedImages.length > 0 && generatedImages.some(img => img !== null) && (
                        <button onClick={sendToSketchup} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-bold flex items-center gap-2 hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 transition-transform active:scale-95">
                          <Icon name="Box" className="w-4 h-4" /> Apply to SketchUp
                        </button>
                      )}
                    </div>
                    <div className="relative flex-grow bg-slate-950 p-6">
                      {generatedImages.length > 0 ? (
                        <div className="grid grid-cols-2 gap-4 h-full">
                          {generatedImages.map((img, idx) => (
                            <div key={idx} onClick={() => img && setFocusedImageIdx(idx)} className={`relative rounded-2xl overflow-hidden cursor-pointer transition-all duration-500 border-4 ${focusedImageIdx === idx ? 'border-blue-500 scale-[1.02] shadow-2xl z-10' : 'border-transparent opacity-50 hover:opacity-100'} ${!img ? 'bg-slate-900/50 flex items-center justify-center' : ''}`}>
                              {img ? (
                                <>
                                  <img src={img} className="w-full h-full object-cover" />
                                  <div className="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg text-[8px] font-black uppercase text-white border border-white/10">
                                    {SHOT_TYPES[activeShots[idx % activeShots.length]]?.name || "View"}
                                  </div>
                                  {focusedImageIdx === idx && <div className="absolute top-3 right-3 bg-blue-500 p-1 rounded-full"><Icon name="CheckCircle2" className="w-3 h-3 text-white" /></div>}
                                </>
                              ) : (
                                <Icon name="RefreshCw" className="animate-spin w-8 h-8 text-slate-700" />
                              )}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center opacity-10 text-center select-none">
                          <Icon name="Cpu" className="w-24 h-24 mb-6" />
                          <p className="text-2xl font-black uppercase tracking-[0.5em]">Engine Standby</p>
                          <p className="text-[10px] text-slate-600 uppercase tracking-widest mt-2 font-bold">Vercel Build Environment Detected</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4">
                <h2 className="text-2xl font-black flex items-center gap-3 uppercase italic tracking-tighter">
                   <Icon name="Layers" className="text-blue-500 w-8 h-8" /> Session Archive
                </h2>
                {history.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    {history.map((img, idx) => (
                      <div key={idx} className="group relative aspect-square rounded-2xl overflow-hidden border border-white/10 bg-slate-900 shadow-xl">
                        <img src={img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                            <button onClick={() => { const link = document.createElement('a'); link.href = img; link.download = `skpg-${idx}.png`; link.click(); }} className="px-4 py-2 bg-blue-600 rounded-lg text-[9px] font-bold uppercase tracking-widest">Export</button>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <div className="py-20 text-center opacity-20 italic font-black uppercase tracking-[0.3em]">No Variations Found</div>}
              </div>
            )}
          </main>

          <footer className="border-t border-white/5 py-8 mt-12 text-center opacity-40">
             <p className="text-[9px] uppercase tracking-[0.4em] font-bold text-slate-500">Smart Prompt Generator v3.6 // Developed by Jeck // Accuracy Engine Alpha</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
