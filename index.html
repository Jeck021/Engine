<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKPG Engine - Smart Prompt Generator by Jeck</title>
  <!-- CDNs for Standalone Deployment (Netlify/Vercel compatible) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load React FIRST -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load Core Lucide library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
    .image-placeholder {
      background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    /**
     * Stable Icon Component for Live Hosting
     */
    const Icon = ({ name, size = 16, className = "" }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        const render = () => {
          if (containerRef.current && window.lucide) {
            containerRef.current.innerHTML = '';
            const iconName = name.charAt(0).toLowerCase() + name.slice(1);
            const iconData = window.lucide.icons[iconName] || window.lucide.icons.helpCircle;
            if (iconData) {
              const svg = window.lucide.createSvg(iconData, {
                width: size,
                height: size,
                class: className,
                'stroke-width': 2,
                stroke: 'currentColor',
                fill: 'none'
              });
              containerRef.current.appendChild(svg);
            }
          }
        };
        if (window.lucide) render();
        else {
          const check = setInterval(() => { if (window.lucide) { render(); clearInterval(check); } }, 100);
          return () => clearInterval(check);
        }
      }, [name, size, className]);
      return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" />;
    };

    const apiKey = ""; 

    // STRICT ENGINE DEFINITIONS
    const STYLES = {
      corona: { 
        name: "Corona Renderer", 
        promptSuffix: "Mimic Chaos Corona 11 Engine: Use unbiased path tracing, photorealistic lightmix, physically based shaders, soft ray-traced shadows, complex light bouncing (GI), high-end arch-viz realism, realistic material depth, 8k raw photography." 
      },
      unreal: { 
        name: "Unreal Engine 5", 
        promptSuffix: "Mimic Unreal Engine 5.4: Use Lumen real-time global illumination, Nanite geometry precision, volumetric fog, Ray-traced reflections (SSR), cinematographic lighting, realistic sky atmosphere, high-fidelity real-time game engine aesthetics." 
      },
      midjourney: { 
        name: "Midjourney V6 Style", 
        promptSuffix: "Mimic Midjourney V6.1: Highly stylized architectural photography, dramatic cinematic lighting, vibrant color science, Phase One XF 100MP clarity, award-winning composition, hyper-aesthetic textural detail, crisp focus." 
      },
      seedream: {
        name: "Seedream 4.0",
        promptSuffix: "Mimic Seedream 4.0 Engine: Advanced neural material synthesis, ultra-high aesthetic realism, perfect light-to-shadow roll-off, dreamy but hyper-sharp architectural textures, superior material physics, high dynamic range, masterpiece visualization."
      },
      flux: { 
        name: "Flux Engine", 
        promptSuffix: "Mimic Flux.1 Pro: Extreme structural precision, realistic material imperfections (roughness, grain), neutral studio-grade daylight, hyper-detail on every pixel, perfect straight architectural lines, 16k resolution materials." 
      },
      nanobanana: { 
        name: "Nano Banana Style", 
        promptSuffix: "Mimic Nano Banana: Ultra-clarity rendering, smooth polished surfaces, vibrant high-fidelity color saturation, clean minimalist architectural lines, hyper-realistic material clarity, futuristic architectural finish." 
      },
      kling: { 
        name: "Kling Cinematic", 
        promptSuffix: "Mimic Kling Cinematic: Professional film stock look, 35mm anamorphic lens, rich Kodak Portra 400 color grading, deep cinematic shadows, natural lens flares, cinematic motion depth, high dynamic range." 
      },
      leonardo: { 
        name: "Leonardo AI", 
        promptSuffix: "Mimic Leonardo AI PhotoReal: Creative lighting setups, fine-tuned architectural textures, balanced professional highlight roll-off, realistic surface reflections, high-end digital art architectural visualization." 
      },
      sdxl: { 
        name: "SDXL / Free", 
        promptSuffix: "Mimic Stable Diffusion XL: Clean architectural layout, realistic soft shadows, high-detail edges, 4k sharp photography, realistic lighting contrast, versatile material rendering." 
      }
    };

    const SHOT_TYPES = {
      macro: { name: "Macro", suffix: "Extreme macro 100mm lens, ultra close-up on building materials, subsurface scattering on textures, shallow depth of field, realistic bokeh." },
      front: { name: "Front", suffix: "Direct zero-degree front elevation, 50mm architectural lens, perfectly straight vertical lines, symmetrical facade photography, eye-level." },
      perspective: { name: "Perspective", suffix: "Cinematic corner perspective, 24mm wide-angle lens, low-angle ground view, forced depth perception, structural volume focus." }
    };

    const CAMERA_TYPES = {
      default: { name: "Pro DSLR", suffix: "shot on professional DSLR camera, full-frame CMOS sensor, high dynamic range, crisp architectural clarity" },
      mirrorless: { name: "Mirrorless", suffix: "shot on Sony A7R V, mirrorless camera precision, high-resolution sensor, natural color reproduction" },
      drone: { name: "Drone", suffix: "shot on DJI Mavic 3 Pro, high-altitude drone photography, aerial perspective, clear wide optics" },
      iphone: { name: "iPhone / Mobile", suffix: "shot on iPhone 15 Pro, mobile computational photography, deep fusion processing, high-end smartphone aesthetics" },
      medium_format: { name: "Medium Format", suffix: "shot on Phase One XF, 100MP medium format sensor, incredible textural detail, massive dynamic range, professional studio quality" },
      analog: { name: "35mm Film", suffix: "shot on Leica M6, 35mm film camera, analog film aesthetic, organic color roll-off, authentic film feel" }
    };

    const CAMERA_EFFECTS = {
      default: { name: "Standard Sharp", suffix: "sharp focus throughout, clear lens clarity, professional architectural sharpness" },
      bokeh: { name: "Shallow DOF", suffix: "shot with f/1.8 aperture, creamy blurred background, shallow depth of field, beautiful bokeh highlights, razor sharp focal point" },
      long_exposure: { name: "Long Exposure", suffix: "long exposure photography, 5-second shutter speed, slight motion blur on clouds and people, silky smooth water reflections" },
      film_grain: { name: "35mm Film Grain", suffix: "shot on 35mm Kodak Portra 400, realistic film grain, analog texture, organic film stock look, vintage high-end feel" },
      lens_flare: { name: "Anamorphic Flare", suffix: "realistic anamorphic lens flares, horizontal light streaks, subtle blue light artifacts, high-end cinematic optics" },
      motion_blur: { name: "Action Blur", suffix: "realistic motion blur on street elements, cinematic movement speed, dynamic architectural atmosphere" },
      vignette: { name: "Pro Vignette", suffix: "subtle professional lens vignetting, focus pull to center, realistic optical fall-off on corners" }
    };

    const SEASONS = {
      default: { name: "Standard", suffix: "neutral daylight, clear sky, realistic sun position." },
      spring: { name: "Spring", suffix: "spring morning, soft gentle sunlight, fresh blooming vegetation, realistic green saturation." },
      summer: { name: "Summer", suffix: "harsh summer afternoon sun, high-contrast crisp shadows, heat haze, lush deep green trees, clear blue sky." },
      autumn: { name: "Autumn", suffix: "golden hour autumn, warm orange lighting, scattered golden leaves, crisp dry atmosphere." },
      winter: { name: "Winter", suffix: "overcast winter day, realistic heavy snow accumulation on architecture, frosted glass, cold blue shadows, misty air." },
      monsoon: { name: "Monsoon", suffix: "rainy afternoon, wet surfaces with high reflectivity, dark moody storm clouds, puddles with ray-traced reflections, atmospheric humidity." }
    };

    const COUNTRIES = {
      default: { name: "No People", suffix: "" },
      se_asian: { name: "Southeast Asian", suffix: "Southeast Asian people walking in the scene" },
      european: { name: "European", suffix: "European people walking in the scene" },
      middle_eastern: { name: "Middle Eastern", suffix: "Middle Eastern people in local attire walking in the scene" },
      african: { name: "African", suffix: "African people walking in the scene" },
      east_asian: { name: "East Asian", suffix: "East Asian people walking in the scene" },
      north_american: { name: "North American", suffix: "North American people walking in the scene" },
      south_american: { name: "South American", suffix: "South American people walking in the scene" }
    };

    const CLOUDS = {
      default: { name: "Clear", suffix: "perfectly clear sky" },
      cirrus: { name: "Cirrus", suffix: "wispy thin cirrus clouds" },
      cumulus: { name: "Cumulus", suffix: "large fluffy white cumulus clouds" },
      stratus: { name: "Stratus", suffix: "flat overcast stratus clouds" },
      stormy: { name: "Stormy", suffix: "dark heavy cumulonimbus storm clouds" },
      sunset_clouds: { name: "Golden clouds", suffix: "golden hour colored clouds" }
    };

    const VEHICLES = {
      default: { name: "No Vehicle", suffix: "" },
      suv: { name: "SUV", suffix: "a modern luxury SUV parked in front of the building" },
      car: { name: "CAR", suffix: "a sleek modern sedan car parked nearby" },
      medical: { name: "Medical Services", suffix: "an emergency medical services ambulance parked with emergency lights" }
    };

    const ROAD_MARKS = {
      default: { name: "No Marks", suffix: "" },
      crosswalk: { name: "Crosswalk", suffix: "vivid white pedestrian crosswalk markings on the asphalt" },
      yellow_lines: { name: "Yellow Lines", suffix: "double yellow lane divider lines on the road" },
      white_lines: { name: "White Lines", suffix: "dashed white lane markings on the asphalt" },
      arrows: { name: "Arrows", suffix: "directional road arrow markings for traffic flow" },
      bike_lane: { name: "Bike Lane", suffix: "dedicated green bike lane markings on the road surface" }
    };

    const LIGHT_MODES = {
      default: { name: "Natural", suffix: "natural daylight environment" },
      interior: { name: "Interior", suffix: "warm interior lights glowing through windows, detailed internal lighting, indoor depth" },
      exterior: { name: "Exterior", suffix: "architectural facade lighting, spotlights illuminating the building exterior, landscape lights" }
    };

    const App = () => {
      const [selectedImage, setSelectedImage] = useState(null);
      const [previewUrl, setPreviewUrl] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [userSubject, setUserSubject] = useState("");
      const [generatedImages, setGeneratedImages] = useState([]);
      const [focusedImageIdx, setFocusedImageIdx] = useState(0);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isRefining, setIsRefining] = useState(false);
      const [activeStyle, setActiveStyle] = useState('corona');
      const [activeShots, setActiveShots] = useState(['macro', 'front', 'perspective']);
      const [activeCamera, setActiveCamera] = useState('default');
      const [activeEffect, setActiveEffect] = useState('default');
      const [activeSeason, setActiveSeason] = useState('default');
      const [activePeople, setActivePeople] = useState('default');
      const [activeCloud, setActiveCloud] = useState('default');
      const [activeVehicle, setActiveVehicle] = useState('default');
      const [activeRoadMarks, setActiveRoadMarks] = useState('default');
      const [activeLights, setActiveLights] = useState('default');
      const [history, setHistory] = useState([]);
      const [activeTab, setActiveTab] = useState('generate');
      const [status, setStatus] = useState("");

      const [isInpaintMode, setIsInpaintMode] = useState(false);
      const [brushSize, setBrushSize] = useState(30);
      const canvasRef = useRef(null);
      const imageRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      
      const prevSettings = useRef({});

      /**
       * AUTOMATIC CONNECTIVITY:
       * Monitors all selections and rebuilds the Master Prompt string.
       */
      useEffect(() => {
        const styleName = STYLES[activeStyle]?.name || "";
        const seasonName = SEASONS[activeSeason]?.name || "";
        const cloudName = CLOUDS[activeCloud]?.name || "";
        const peopleName = COUNTRIES[activePeople]?.name || "";
        const vehicleName = VEHICLES[activeVehicle]?.name || "";
        const roadMarkName = ROAD_MARKS[activeRoadMarks]?.name || "";
        const lightsName = LIGHT_MODES[activeLights]?.name || "";
        const effectName = CAMERA_EFFECTS[activeEffect]?.name || "";
        const cameraName = CAMERA_TYPES[activeCamera]?.name || "";
        const shotNames = activeShots.map(key => SHOT_TYPES[key]?.name).filter(Boolean);
        
        let parts = [];
        if (userSubject) parts.push(userSubject);
        if (shotNames.length > 0) parts.push(`${shotNames.join(", ")} Views`);
        if (cameraName) parts.push(`Captured on ${cameraName}`);
        if (effectName && effectName !== "Standard Sharp") parts.push(`with ${effectName} effect`);
        if (seasonName && seasonName !== "Standard") parts.push(`${seasonName} Season`);
        if (cloudName && cloudName !== "Clear") parts.push(`${cloudName} Clouds`);
        if (peopleName && peopleName !== "No People") parts.push(`with ${peopleName} people`);
        if (vehicleName && vehicleName !== "No Vehicle") parts.push(`featuring a ${vehicleName}`);
        if (roadMarkName && roadMarkName !== "No Marks") parts.push(`with ${roadMarkName} road marks`);
        if (lightsName && lightsName !== "Natural") parts.push(`${lightsName} Lighting focus`);
        if (styleName) parts.push(`Rendered in ${styleName}`);
        
        setPrompt(parts.join(", "));
      }, [activeStyle, activeSeason, activeShots, activePeople, activeCloud, activeVehicle, activeRoadMarks, activeLights, activeEffect, activeCamera, userSubject]);

      const fetchWithRetry = async (url, options, retries = 5) => {
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (response.ok) return await response.json();
            const errData = await response.json();
            throw new Error(errData.error?.message || "API Failure");
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
          }
        }
      };

      const handleProcess = async () => {
        if (!prompt && !userSubject) { setStatus("Enter or select a prompt."); return; }
        setIsGenerating(true);
        setStatus(`Start Engine: Mimicking ${STYLES[activeStyle].name}...`);
        setGeneratedImages([null, null, null]); 
        setFocusedImageIdx(0);
        
        const maskBase64 = isInpaintMode ? getMaskData() : null;

        const processVariation = async (idx) => {
          const shotKey = activeShots.length > 0 ? activeShots[idx % activeShots.length] : null;
          const shotData = shotKey ? SHOT_TYPES[shotKey] : { name: "Standard Cinematic", suffix: "standard architectural eye-level perspective, cinematic composition." };
          
          const cameraData = CAMERA_TYPES[activeCamera];
          const effectData = CAMERA_EFFECTS[activeEffect];
          const styleData = STYLES[activeStyle];
          const seasonData = SEASONS[activeSeason];
          const peopleData = COUNTRIES[activePeople];
          const cloudData = CLOUDS[activeCloud];
          const vehicleData = VEHICLES[activeVehicle];
          const roadMarkData = ROAD_MARKS[activeRoadMarks];
          const lightsData = LIGHT_MODES[activeLights];

          const technicalCore = `MIMIC ENGINE: ${styleData.promptSuffix}. HARDWARE: ${cameraData.suffix}. LOCK CAMERA: ${shotData.name}. LENS: ${shotData.suffix}. OPTICAL EFFECT: ${effectData.suffix}. ENVIRONMENT: ${seasonData.suffix}. SKY: ${cloudData.suffix}. VEHICLE: ${vehicleData.suffix}. ROAD: ${roadMarkData.suffix}. LIGHTS: ${lightsData.suffix}. PEOPLE: ${peopleData.suffix}.`;
          const finalVariationPrompt = `${technicalCore} SUBJECT: ${userSubject || prompt || "Architectural masterpiece"}. Photorealistic, masterpiece, highly detailed materials.`;
          
          try {
            let b64 = null;
            if (selectedImage) {
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [
                    { text: isInpaintMode 
                        ? `STRICT TASK: Modify ONLY masked area. LOCK CAMERA to ${shotData.name}. EMULATE ${styleData.name} EXACTLY. Apply camera: ${cameraData.name}. Prompt: ${finalVariationPrompt}.`
                        : `STRICT INSTRUCTION: EMULATE ${styleData.name} CHARACTERISTICS. Use ${cameraData.name} hardware optics. Treat reference as structural guide. LOCK CAMERA POSITION to ${shotData.name}. MAINTAIN EXACT BUILDING GEOMETRY. APPLY CAMERA EFFECT: ${effectData.name}. RE-RENDER as a photorealistic professional photograph. Apply engine specs: ${finalVariationPrompt}.` 
                    },
                    { inlineData: { mimeType: "image/png", data: selectedImage } }
                  ]}],
                  generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                })
              });
              b64 = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
            } else {
              const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instances: { prompt: finalVariationPrompt }, parameters: { sampleCount: 1 } })
              });
              b64 = res.predictions?.[0]?.bytesBase64Encoded;
            }

            if (b64) {
              const dataUrl = `data:image/png;base64,${b64}`;
              setGeneratedImages(prev => {
                const updated = [...prev];
                updated[idx] = dataUrl;
                return updated;
              });
              setHistory(prev => [dataUrl, ...prev]);
            }
          } catch (err) {
            console.error(`Variation ${idx} Error:`, err);
          }
        };

        try {
          await Promise.all([0, 1, 2].map(i => processVariation(i)));
          setStatus(`${STYLES[activeStyle].name} Run Complete.`);
        } catch (error) { 
          setStatus("Engine Failure."); 
        } finally { 
          setIsGenerating(false); 
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setSelectedImage(reader.result.split(',')[1]); 
            setPreviewUrl(reader.result);
          };
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      };

      const removeImage = () => { setSelectedImage(null); setPreviewUrl(null); setIsInpaintMode(false); };

      const initCanvas = () => {
        const canvas = canvasRef.current;
        if (!canvas || !imageRef.current) return;
        const img = imageRef.current;
        canvas.width = img.clientWidth;
        canvas.height = img.clientHeight;
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.6)'; 
        ctx.lineWidth = brushSize;
      };

      useEffect(() => {
        if (isInpaintMode && previewUrl) setTimeout(initCanvas, 100);
      }, [isInpaintMode, previewUrl, brushSize]);

      const startDrawing = (e) => { if (isInpaintMode) { setIsDrawing(true); draw(e); } };
      const stopDrawing = () => { setIsDrawing(false); if (canvasRef.current) canvasRef.current.getContext('2d').beginPath(); };
      const draw = (e) => {
        if (!isDrawing || !isInpaintMode) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        ctx.lineWidth = brushSize;
        ctx.lineTo(clientX - rect.left, clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(clientX - rect.left, clientY - rect.top);
      };

      const clearMask = () => { if (canvasRef.current) canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); };
      const getMaskData = () => {
        if (!canvasRef.current) return null;
        const temp = document.createElement('canvas');
        temp.width = canvasRef.current.width; temp.height = canvasRef.current.height;
        const ctx = temp.getContext('2d');
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, temp.width, temp.height);
        ctx.drawImage(canvasRef.current, 0, 0);
        const data = ctx.getImageData(0, 0, temp.width, temp.height);
        for (let i = 0; i < data.length; i += 4) { if (data[i + 3] > 0) { data[i] = 255; data[i+1] = 255; data[i+2] = 255; data[i+3] = 255; } }
        ctx.putImageData(data, 0, 0);
        return temp.toDataURL('image/png').split(',')[1];
      };

      const sendToSketchup = () => {
        const activeImage = generatedImages[focusedImageIdx];
        if (window.sketchup && activeImage) {
          window.sketchup.apply_texture(activeImage.split(',')[1]);
        } else { setStatus("Syncing selection..."); }
      };

      const refinePrompt = async () => {
        if (!selectedImage) { setStatus("Upload model screenshot first! ✨"); return; }
        setIsRefining(true); setStatus("✨ Magic Refine: Calibrating Photorealism...");
        try {
          const systemPrompt = `You are an expert architectural visualization mimic. Analyze the building structure. Think like ${STYLES[activeStyle].name}. Suggest a hyper-realistic prompt using professional ${CAMERA_TYPES[activeCamera].name} optics. STICK TO THE EXACT GEOMETRY SHOWN. Focus on professional light physics, material rollout, and realistic foliage. DO NOT add floors or structural wings. Output ONLY the refined prompt.`;
          const userQuery = `Refine this architectural subject for photorealism while strictly preserving the building form in the image: ${userSubject || "Modern building"}`;
          
          const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: systemPrompt + " " + userQuery },
                  { inlineData: { mimeType: "image/png", data: selectedImage } }
                ]
              }]
            })
          });

          const refined = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (refined) { 
            const cleanText = refined.trim().replace(/^Prompt: /i, "");
            setUserSubject(cleanText); 
            setStatus("✨ Accuracy Calibrated!"); 
          }
        } catch (error) { setStatus("Refinement failed."); } finally { setIsRefining(false); }
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30 overflow-x-hidden">
          <header className="border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 h-16 flex items-center">
            <div className="max-w-7xl mx-auto px-4 w-full flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                  <Icon name="Sparkles" className="text-white w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white tracking-tight">SKPG Engine</h1>
                  <p className="text-[9px] uppercase tracking-widest text-blue-400 font-bold tracking-[0.2em]">High-Fidelity Engine Pipeline</p>
                </div>
              </div>
              <nav className="flex bg-slate-800/50 p-1 rounded-lg border border-white/5">
                <button onClick={() => setActiveTab('generate')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'generate' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Generate</button>
                <button onClick={() => setActiveTab('history')} className={`px-4 py-1.5 rounded-md text-sm transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white' : 'hover:text-white'}`}>Gallery</button>
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            {activeTab === 'generate' ? (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-4 space-y-6">
                  <section className="bg-slate-900 border border-white/5 rounded-2xl p-6 shadow-xl space-y-6 overflow-y-auto max-h-[85vh] custom-scrollbar">
                    
                    {/* Render Engine */}
                    <div>
                      <div className="flex items-center gap-2 mb-3">
                         <Icon name="Cpu" className="w-3 h-3 text-blue-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Render Engine</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        {Object.keys(STYLES).map(key => (
                          <button key={key} onClick={() => setActiveStyle(key)} className={`p-2 rounded-lg text-[9px] font-bold border transition-all text-left flex flex-col justify-center ${activeStyle === key ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800 border-white/5 text-slate-400 hover:border-white/10'}`}>
                            <span className="truncate">{STYLES[key].name}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Season & Atmosphere */}
                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="CloudSun" className="w-3 h-3 text-emerald-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Season & Atmosphere</label>
                      </div>
                      <div className="grid grid-cols-2 gap-2 mb-3">
                        {Object.entries(SEASONS).map(([key, season]) => (
                          <button key={key} onClick={() => setActiveSeason(key)} className={`p-2 rounded-xl text-[9px] font-bold border transition-all text-left flex items-center justify-between ${activeSeason === key ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg shadow-emerald-900/20' : 'bg-slate-800 border-white/5 text-slate-400 hover:border-white/10'}`}>
                            {season.name}
                            {activeSeason === key && <Icon name="CheckCircle2" className="w-3 h-3" />}
                          </button>
                        ))}
                      </div>
                      <div className="flex items-center gap-2 mb-2">
                         <Icon name="Cloud" className="w-2.5 h-2.5 text-slate-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase">Cloud Type</label>
                      </div>
                      <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                        {Object.entries(CLOUDS).map(([key, cloud]) => (
                          <button key={key} onClick={() => setActiveCloud(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeCloud === key ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                            {cloud.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Lighting Mode */}
                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="Lamp" className="w-3 h-3 text-yellow-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Lighting Mode</label>
                      </div>
                      <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                        {Object.entries(LIGHT_MODES).map(([key, light]) => (
                          <button key={key} onClick={() => setActiveLights(key)} className={`shrink-0 px-4 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeLights === key ? 'bg-yellow-600 border-yellow-500 text-white' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                            {light.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* People */}
                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="Users" className="w-3 h-3 text-amber-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">People (Country)</label>
                      </div>
                      <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                        {Object.entries(COUNTRIES).map(([key, country]) => (
                          <button key={key} onClick={() => setActivePeople(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activePeople === key ? 'bg-amber-600 border-amber-500 text-white' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                            {country.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Vehicles */}
                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="CarFront" className="w-3 h-3 text-red-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Vehicles</label>
                      </div>
                      <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                        {Object.entries(VEHICLES).map(([key, vehicle]) => (
                          <button key={key} onClick={() => setActiveVehicle(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeVehicle === key ? 'bg-red-600 border-red-500 text-white' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                            {vehicle.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Road Marks */}
                    <div>
                       <div className="flex items-center gap-2 mb-3">
                         <Icon name="Navigation" className="w-3 h-3 text-cyan-400" />
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Road Marks</label>
                      </div>
                      <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                        {Object.entries(ROAD_MARKS).map(([key, mark]) => (
                          <button key={key} onClick={() => setActiveRoadMarks(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeRoadMarks === key ? 'bg-cyan-600 border-cyan-500 text-white' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                            {mark.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Camera Options Cluster */}
                    <div className="space-y-4 pt-4 border-t border-white/5">
                      {/* Camera Hardware */}
                      <div>
                        <div className="flex items-center gap-2 mb-3">
                           <Icon name="Camera" className="w-3 h-3 text-blue-400" />
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Camera Hardware</label>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                          {Object.entries(CAMERA_TYPES).map(([key, cam]) => (
                            <button key={key} onClick={() => setActiveCamera(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeCamera === key ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                              {cam.name}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Camera Effects */}
                      <div>
                         <div className="flex items-center gap-2 mb-3">
                           <Icon name="Focus" className="w-3 h-3 text-fuchsia-400" />
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Camera Effects</label>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-wrap">
                          {Object.entries(CAMERA_EFFECTS).map(([key, effect]) => (
                            <button key={key} onClick={() => setActiveEffect(key)} className={`shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-bold border transition-all whitespace-nowrap ${activeEffect === key ? 'bg-fuchsia-600 border-fuchsia-500 text-white shadow-lg shadow-fuchsia-900/20' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                              {effect.name}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Camera Shots */}
                      <div>
                        <div className="flex items-center justify-between mb-3">
                           <div className="flex items-center gap-2">
                              <Icon name="Video" className="w-3 h-3 text-indigo-400" />
                              <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Camera Shots (Optional)</label>
                           </div>
                           <span className="text-[9px] font-black px-1.5 py-0.5 rounded bg-blue-600/20 text-blue-400">
                              {String(activeShots.length)} Active
                           </span>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                          {Object.entries(SHOT_TYPES).map(([key, shot]) => (
                            <button key={key} onClick={() => {
                              setActiveShots(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
                            }} className={`p-2 rounded-xl text-[10px] font-bold border transition-all text-left flex items-center justify-between ${activeShots.includes(key) ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-800 border-white/5 text-slate-400'}`}>
                              {shot.name}
                              {activeShots.includes(key) && <Icon name="CheckCircle2" className="w-3 h-3" />}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Model Reference */}
                    <div className="pt-4 border-t border-white/5">
                      <div className="flex justify-between items-center mb-3">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Model Reference</label>
                        <button onClick={() => setIsInpaintMode(!isInpaintMode)} className={`text-[9px] flex items-center gap-1 px-2 py-1 rounded-lg transition-all font-bold uppercase ${isInpaintMode ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500 border border-white/5'}`}>
                          <Icon name="Brush" className="w-3 h-3" /> Inpaint
                        </button>
                      </div>
                      <div className="relative overflow-hidden rounded-xl border border-white/10 bg-slate-950 aspect-video group shadow-inner image-placeholder">
                        <div className={`absolute inset-0 flex flex-col items-center justify-center transition-all ${previewUrl ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} onClick={() => document.getElementById('image-upload').click()}>
                          <Icon name="Upload" className="w-8 h-8 text-slate-800 mb-2" />
                          <span className="text-[10px] text-slate-600 font-bold uppercase text-center px-4 tracking-tighter">Capture Model Viewport</span>
                        </div>
                        {previewUrl && (
                          <div className="relative w-full h-full">
                            <img ref={imageRef} src={previewUrl} className="w-full h-full object-contain" />
                            {isInpaintMode && <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full cursor-crosshair touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />}
                            <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                              <button onClick={() => document.getElementById('image-upload').click()} className="p-1.5 bg-black/60 rounded-lg hover:bg-black transition-all shadow-xl" title="Change Photo"><Icon name="RefreshCw" className="w-3 h-3 text-white" /></button>
                              <button onClick={removeImage} className="p-1.5 bg-black/60 rounded-lg hover:bg-red-600 transition-all shadow-xl" title="Remove Photo"><Icon name="Trash2" className="w-3 h-3 text-white" /></button>
                              {isInpaintMode && <button onClick={clearMask} className="p-1.5 bg-black/60 rounded-lg hover:bg-red-500 transition-all shadow-xl" title="Clear Mask"><Icon name="RotateCcw" className="w-3 h-3 text-white" /></button>}
                            </div>
                          </div>
                        )}
                        <input id="image-upload" type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                      </div>
                    </div>

                    {/* Master Prompt */}
                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Master Prompt</label>
                        <button onClick={refinePrompt} disabled={isRefining || !selectedImage} className="text-[9px] flex items-center gap-1 text-blue-400 disabled:opacity-30 font-bold uppercase"><Icon name="Wand2" className="w-3 h-3" /> Magic Refine</button>
                      </div>
                      <textarea value={prompt} onChange={(e) => {
                          const val = e.target.value;
                          setPrompt(val);
                          const parts = val.split(',');
                          if (parts.length > 0) setUserSubject(parts[0].trim());
                        }} 
                        placeholder="Describe your design intentions..."
                        className="w-full h-28 bg-slate-800 rounded-xl p-4 text-xs focus:ring-2 focus:ring-blue-500/50 outline-none resize-none border border-white/5 leading-relaxed" 
                      />
                    </div>

                    <button onClick={handleProcess} disabled={isGenerating} className={`w-full py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] transition-all flex items-center justify-center gap-3 shadow-2xl ${isGenerating ? 'bg-slate-800' : 'bg-blue-600 hover:bg-blue-500 active:scale-[0.98]'} disabled:opacity-50`}>
                      {isGenerating ? <Icon name="RefreshCw" className="animate-spin w-5 h-5 text-white" /> : <Icon name="Zap" className="w-5 h-5 text-white shadow-xl" />}
                      {isGenerating ? 'Engine Processing...' : 'Start Engine'}
                    </button>
                  </section>

                  {status && (
                    <div className="bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl flex items-center gap-2 overflow-hidden">
                      <Icon name="Info" className="w-4 h-4 text-blue-400 shrink-0" />
                      <p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest text-ellipsis overflow-hidden whitespace-nowrap">{String(status)}</p>
                    </div>
                  )}
                </div>

                <div className="lg:col-span-8 flex flex-col gap-6">
                  <div className="bg-slate-900 border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl flex flex-col flex-grow min-h-[600px]">
                    <div className="p-5 bg-slate-800/30 flex justify-between items-center border-b border-white/5">
                      <div className="flex items-center gap-3">
                        <Icon name="LayoutGrid" className="w-4 h-4 text-blue-400" />
                        <span className="text-xs font-bold uppercase tracking-widest text-slate-400 italic">Triple-Engine Accuracy Pipeline</span>
                      </div>
                      {generatedImages.length > 0 && generatedImages.some(img => img !== null) && (
                        <button onClick={sendToSketchup} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-bold flex items-center gap-2 hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 transition-transform active:scale-95">
                          <Icon name="Box" className="w-4 h-4" /> Apply to SketchUp
                        </button>
                      )}
                    </div>
                    <div className="relative flex-grow bg-slate-950 p-6">
                      {generatedImages.length > 0 ? (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 h-full">
                          {generatedImages.map((img, idx) => (
                            <div key={idx} onClick={() => img && setFocusedImageIdx(idx)} className={`relative rounded-2xl overflow-hidden cursor-pointer transition-all duration-500 border-4 ${focusedImageIdx === idx ? 'border-blue-500 scale-[1.02] shadow-2xl z-10' : 'border-transparent opacity-50 hover:opacity-100'} ${!img ? 'bg-slate-900/50 flex items-center justify-center animate-pulse' : ''}`}>
                              {img ? (
                                <>
                                  <img src={img} className="w-full h-full object-cover" alt="Variation" />
                                  <div className="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg text-[8px] font-black uppercase text-white border border-white/10">
                                    {activeShots.length > 0 ? SHOT_TYPES[activeShots[idx % activeShots.length]]?.name : "Standard"}
                                  </div>
                                  {focusedImageIdx === idx && <div className="absolute top-3 right-3 bg-blue-500 p-1.5 rounded-full"><Icon name="CheckCircle2" className="w-4 h-4 text-white" /></div>}
                                </>
                              ) : (
                                <Icon name="RefreshCw" className="animate-spin w-8 h-8 text-slate-700" />
                              )}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center opacity-10 text-center select-none">
                          <Icon name="Cpu" className="w-24 h-24 mb-6" />
                          <p className="text-2xl font-black uppercase tracking-[0.5em]">Engine Standby</p>
                          <p className="text-[10px] text-slate-600 uppercase tracking-widest mt-2 font-bold italic underline decoration-blue-500 decoration-2 underline-offset-4">Software Mimicry Sequence Active</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4">
                <h2 className="text-2xl font-black flex items-center gap-3 uppercase italic tracking-tighter text-blue-400">
                   <Icon name="Layers" className="w-8 h-8" /> Perspective Archive
                </h2>
                {history.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    {history.map((img, idx) => (
                      <div key={idx} className="group relative aspect-square rounded-2xl overflow-hidden border border-white/10 bg-slate-900 shadow-xl">
                        <img src={img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="History" />
                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                            <button onClick={() => { const link = document.createElement('a'); link.href = img; link.download = `skpg-${idx}.png`; link.click(); }} className="px-4 py-2 bg-blue-600 rounded-lg text-[9px] font-bold uppercase tracking-widest">Export</button>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <div className="py-20 text-center opacity-20 italic font-black uppercase tracking-[0.3em]">No Variations Found</div>}
              </div>
            )}
          </main>

          <footer className="border-t border-white/5 py-8 mt-12 text-center opacity-40">
             <p className="text-[9px] uppercase tracking-[0.4em] font-bold text-slate-500">Smart Prompt Generator v3.8 // Developed by Jeck // Realistic Geometry Pipeline</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
